<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Acesso ao Painel Administrativo do Jornal Tech.">
  <title>Acesso ao Painel - Jornal Tech</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;700;800&display=swap" rel="stylesheet">
  <!-- Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <!-- Bootstrap 5.3.8 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Custom CSS -->
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100" style="background: #f8f9fa;">

  <!-- ============================================================= -->
  <!-- NAVBAR SIMPLES                                                -->
  <!-- ============================================================= -->
  <nav class="navbar navbar-dark bg-dark fixed-top border-bottom border-secondary">
    <div class="container-editorial d-flex flex-wrap justify-content-between align-items-center w-100">
      <a class="navbar-brand fw-bold" href="index.html" style="font-family: 'Manrope', sans-serif; letter-spacing: -0.03em; font-size: 1.25rem;">
        Jornal Tech
      </a>
      <a href="index.html" class="text-secondary text-decoration-none small fw-medium" style="font-family: 'Manrope', sans-serif;">
        Voltar ao site
      </a>
    </div>
  </nav>

  <!-- ============================================================= -->
  <!-- LOGIN FORM (ID 11, 12, 13, 14)                                -->
  <!-- ============================================================= -->
  <main class="flex-grow-1 d-flex align-items-center justify-content-center px-3" style="padding-top: 5rem; padding-bottom: 3rem;">
    <div style="max-width: 400px; width: 100%;">
      <!-- Card -->
      <div class="login-card">
        <!-- Title -->
        <div class="mb-4">
          <h1 class="h4 fw-bold mb-2" style="font-family: 'Manrope', sans-serif; letter-spacing: -0.02em;">Acesso ao Painel</h1>
          <p class="text-muted small">Faça login com suas credenciais de administrador.</p>
        </div>

        <!-- Alert -->
        <div class="alert d-none py-2 small" id="login-alert" role="alert"></div>

        <!-- Form (ID 11 - HTML validation, ID 12 - REGEX) -->
        <form id="login-form" novalidate>
          <!-- Email (ID 11 - required, type=email) -->
          <div class="mb-3">
            <label for="login-email" class="form-label-custom">E-mail Institucional</label>
            <input
              type="email"
              class="form-control form-control-custom"
              id="login-email"
              name="email"
              placeholder="seu@email.com"
              required
              autocomplete="email"
            >
            <span class="invalid-feedback d-none" id="email-error">Por favor, insira um e-mail válido.</span>
          </div>

          <!-- Password (ID 11 - required) -->
          <div class="mb-3">
            <label for="login-password" class="form-label-custom">Senha</label>
            <input
              type="password"
              class="form-control form-control-custom"
              id="login-password"
              name="password"
              required
              minlength="3"
              autocomplete="current-password"
            >
            <span class="invalid-feedback d-none" id="password-error">A senha é obrigatória.</span>
          </div>

          <!-- Checkbox (ID 13 - elemento de seleção, ID 14 - localStorage) -->
          <div class="form-check mb-4">
            <input class="form-check-input" type="checkbox" id="login-remember">
            <label class="form-check-label small text-muted" for="login-remember">
              Lembrar meu acesso
            </label>
          </div>

          <!-- Submit Button -->
          <button type="submit" class="btn btn-primary w-100 fw-bold py-3 d-flex align-items-center justify-content-center gap-2" id="login-btn" style="font-family: 'Manrope', sans-serif;">
            Acessar Painel
            <span class="material-symbols-outlined" style="font-size: 1.25rem;">login</span>
          </button>
        </form>

        <!-- Forgot Password -->
        <div class="mt-4 pt-3 border-top text-center" style="border-color: rgba(194,198,216,0.1) !important;">
          <a href="#" class="text-primary text-decoration-none small fw-semibold text-uppercase" style="letter-spacing: 0.1em; font-size: 0.7rem;">
            Esqueceu sua senha?
          </a>
        </div>
      </div>

      <!-- Decorative -->
      <div class="deco-line justify-content-center mt-4">
        <span class="deco-line__line"></span>
        <span class="deco-line__text">Portal Administrativo Seguro</span>
        <span class="deco-line__line"></span>
      </div>
    </div>
  </main>

  <!-- ============================================================= -->
  <!-- FOOTER                                                        -->
  <!-- ============================================================= -->
  <footer class="bg-light py-4 border-top mt-auto">
    <div class="container-editorial d-flex flex-column flex-md-row justify-content-between align-items-center gap-3">
      <span class="small text-muted text-uppercase" style="letter-spacing: 0.1em; font-size: 0.7rem;">
        © 2026 Jornal Tech. The Precise Curator.
      </span>
      <div class="d-flex gap-4">
        <a href="#" class="small text-muted text-decoration-none text-uppercase" style="letter-spacing: 0.05em; font-size: 0.7rem;">Privacidade</a>
        <a href="#" class="small text-muted text-decoration-none text-uppercase" style="letter-spacing: 0.05em; font-size: 0.7rem;">Termos de Uso</a>
        <a href="#" class="small text-muted text-decoration-none text-uppercase" style="letter-spacing: 0.05em; font-size: 0.7rem;">Contato</a>
      </div>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="node_modules/jquery/dist/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/login.js"></script>

</body>
</html>
